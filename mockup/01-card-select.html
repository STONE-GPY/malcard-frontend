<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>MalCard - 카드 선택</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #F8F6F2;
  width: 390px;
  min-height: 844px;
  margin: 0 auto;
}

.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px 0; height: 50px;
  font-size: 15px; font-weight: 600; color: #2D2A26;
}

.header {
  padding: 20px 20px 8px;
}
.logo { font-size: 28px; font-weight: 900; color: #2D2A26; }
.logo span { color: #6C5CE7; }
.subtitle { font-size: 14px; color: #8C857A; margin-top: 4px; }

/* Category Chips */
.chips {
  display: flex; gap: 8px; padding: 16px 20px;
  overflow-x: auto; scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 8px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  border: 1.5px solid transparent;
}
.chip.active { background: #6C5CE7; color: white; }
.chip:not(.active) { background: white; color: #6B6560; border-color: #E8E4DE; }

/* Section */
.section-header {
  padding: 8px 20px 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.section-title { font-size: 16px; font-weight: 800; color: #2D2A26; }

/* Situation Decks */
.deck-scroll {
  display: flex; gap: 12px; padding: 0 20px 4px;
  overflow-x: auto; scrollbar-width: none;
  margin-bottom: 24px;
}
.deck-scroll::-webkit-scrollbar { display: none; }
.deck-card {
  min-width: 150px; border-radius: 18px; padding: 18px;
  color: white; position: relative;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}
.deck-card.purple { background: linear-gradient(150deg, #6C5CE7, #A29BFE); }
.deck-card.orange { background: linear-gradient(150deg, #F57C00, #FFB74D); }
.deck-card.teal { background: linear-gradient(150deg, #00897B, #4DB6AC); }
.deck-emoji { font-size: 30px; margin-bottom: 12px; display: block; }
.deck-title { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
.deck-count { font-size: 11px; opacity: 0.8; }

/* Sentence Cards */
.card-list {
  padding: 0 20px; display: flex; flex-direction: column; gap: 10px;
  margin-bottom: 100px;
}
.sentence-card {
  background: white; border-radius: 14px;
  padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  border-left: 4px solid transparent;
}
.sentence-card.easy { border-left-color: #66BB6A; }
.sentence-card.medium { border-left-color: #FFA726; }
.sentence-card.hard { border-left-color: #EF5350; }
.card-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: #F8F6F2; display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.card-content { flex: 1; }
.card-korean { font-size: 15px; font-weight: 700; color: #2D2A26; margin-bottom: 2px; }
.card-translation { font-size: 11px; color: #A09A92; }
.card-arrow {
  width: 28px; height: 28px; border-radius: 8px;
  background: #F0EDFF; display: flex; align-items: center; justify-content: center;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; width: 390px;
  background: white; border-top: 1px solid #F0ECE6;
  display: flex; justify-content: space-around;
  padding: 10px 0 28px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; color: #B5AFA7;
}
.nav-item.active { color: #6C5CE7; }
</style>
</head>
<body><div id="mobile-frame" style="width:390px;min-height:844px;margin:0;position:relative;overflow:hidden;background:#F8F6F2;">

<div class="status-bar">
  <span>9:41</span>
  <span style="font-size:12px;color:#8C857A">●●●● WiFi 🔋</span>
</div>

<div class="header">
  <div class="logo">Mal<span>Card</span></div>
  <div class="subtitle">오늘의 카드를 골라보세요</div>
</div>

<div class="chips">

<div class="section-header">

<div class="section-header">

<div class="card-list">

    </div>
  </div>
  <div class="sentence-card easy">
    <div class="card-icon">💰</div>

      <div class="card-korean">얼마예요?</div>

    </div>
    <div class="card-arrow">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>
  <div class="sentence-card medium">
    <div class="card-icon">📞</div>
    <div class="card-content">
      <div class="card-korean">전화 받으세요</div>
      <div class="card-translation">Ответьте на звонок</div>
    </div>
    <div class="card-arrow">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>
  <div class="sentence-card easy">
    <div class="card-icon">🙏</div>
    <div class="card-content">
      <div class="card-korean">감사합니다</div>
      <div class="card-translation">Спасибо</div>
    </div>
    <div class="card-arrow">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>
  <div class="sentence-card hard">
    <div class="card-icon">👐</div>
    <div class="card-content">
      <div class="card-korean">손발이 맞다</div>
      <div class="card-translation">Работать слаженно</div>
    </div>
    <div class="card-arrow">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>

  <div class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>기록</span>
  </div>
</div>

</div></body>
</html>
